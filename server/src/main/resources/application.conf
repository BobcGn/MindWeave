ktor {
  deployment {
    host = "0.0.0.0"
    port = 8080
  }

  application {
    modules = [ org.example.mindweave.server.ApplicationModuleKt.appModule ]
  }
}

mindweave {
  service {
    name = "mindweave-server"
  }

  sync {
    postgres {
      jdbcUrl = ${?MINDWEAVE_POSTGRES_URL}
      username = ${?MINDWEAVE_POSTGRES_USER}
      password = ${?MINDWEAVE_POSTGRES_PASSWORD}
    }
  }
}
